name: Selenium Tests

# ---------------------------------------------------------------------------
# INSTANT TRIGGER (PRIMARY) + POLLING (SAFETY NET)
# ---------------------------------------------------------------------------
# Primary path: a separate "vercel-webhook-relay" project listens for
# Vercel's own deployment-succeeded webhook and, on success, fires a
# `repository_dispatch` event (type: vercel-deployment-succeeded) at this
# repo with a client_payload of { deployment_id, url }. That gets us from
# "Vercel finished deploying" to "tests are running" in seconds, with no
# polling delay. Setting up that relay's webhook and its GitHub PAT happens
# in the vercel-webhook-relay project, not here - this repo only needs to
# know how to consume the event it sends.
#
# Safety net: a 30-minute cron. If a webhook delivery is ever missed (relay
# down, GitHub API hiccup, etc.), this catches it within half an hour
# instead of leaving a deployment untested indefinitely. It's intentionally
# no longer the primary mechanism - just a backstop - so it now polls the
# Vercel API directly rather than trusting a payload.
#
# STATE STORAGE CHOICE: a committed file (.github/last-deployment.txt),
# not actions/cache. actions/cache is built for reproducible build inputs
# keyed by a hash of *inputs*, not small mutable state you overwrite on
# every run - cache entries are effectively immutable once saved under a
# key, and unused entries evict after 7 days, which would silently reset
# "already tested" state. A plain committed file has neither problem, never
# expires, and its history is inspectable via
# `git log -- .github/last-deployment.txt`.
#
# SECRETS REQUIRED (this repo's Settings -> Secrets and variables ->
# Actions -> New repository secret) - see README.md for step-by-step
# instructions on finding each value in the Vercel dashboard. These are
# only used by the schedule/workflow_dispatch polling path:
#   - VERCEL_TOKEN       (required) personal API token
#   - VERCEL_PROJECT_ID  (required) the Student_Portal project's ID
#   - VERCEL_TEAM_ID     (optional) only needed if the project lives under
#                         a Vercel Team, not a personal account
# ---------------------------------------------------------------------------

on:
  repository_dispatch:
    types: [vercel-deployment-succeeded]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write # to commit the updated last-deployment.txt back to this repo
  checks: write # for dorny/test-reporter

concurrency:
  group: selenium-tests
  cancel-in-progress: false

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Log trigger source
        run: |
          echo "Triggered by event: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "  repository_dispatch type: ${{ github.event.action }}"
            echo "  client_payload.deployment_id: ${{ github.event.client_payload.deployment_id }}"
            echo "  client_payload.url: ${{ github.event.client_payload.url }}"
          fi

      - name: Determine whether to run tests
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          PAYLOAD_DEPLOYMENT_ID: ${{ github.event.client_payload.deployment_id }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          set -e

          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            # Instant path: the webhook relay already confirmed this deployment
            # is READY in production. Trust its payload, no Vercel API call.
            if [ -z "$PAYLOAD_DEPLOYMENT_ID" ]; then
              echo "::error::repository_dispatch fired with no client_payload.deployment_id." >&2
              exit 1
            fi
            echo "repository_dispatch payload trusted - deployment $PAYLOAD_DEPLOYMENT_ID, running tests immediately."
            echo "new_deployment=true" >> "$GITHUB_OUTPUT"
            echo "deployment_id=$PAYLOAD_DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"

          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual override: run unconditionally, no dedup check. Don't touch
            # the tracker file since we have no real deployment ID to record.
            echo "Manual workflow_dispatch - running tests unconditionally."
            echo "new_deployment=true" >> "$GITHUB_OUTPUT"
            echo "deployment_id=" >> "$GITHUB_OUTPUT"

          else
            # Safety-net path (schedule): poll Vercel and compare against the
            # last deployment we already tested.
            if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
              echo "::error::VERCEL_TOKEN and/or VERCEL_PROJECT_ID secret is missing. See README.md." >&2
              exit 1
            fi

            team_query=""
            if [ -n "$VERCEL_TEAM_ID" ]; then
              team_query="&teamId=$VERCEL_TEAM_ID"
            fi

            response=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=production&state=READY&limit=1$team_query")

            latest_id=$(echo "$response" | jq -r '.deployments[0].uid // empty')
            latest_created=$(echo "$response" | jq -r '.deployments[0].createdAt // empty')

            if [ -z "$latest_id" ]; then
              echo "::error::No READY production deployment found for this project. Response: $response" >&2
              exit 1
            fi

            echo "[safety-net poll] Latest READY production deployment: $latest_id (created $latest_created)"

            last_known=""
            if [ -f .github/last-deployment.txt ]; then
              last_known=$(cat .github/last-deployment.txt)
            fi
            echo "[safety-net poll] Last processed deployment: ${last_known:-<none yet>}"

            if [ "$latest_id" = "$last_known" ]; then
              echo "No new deployment - skipping test run."
              echo "new_deployment=false" >> "$GITHUB_OUTPUT"
            else
              echo "New deployment detected via safety-net poll: $latest_id"
              echo "new_deployment=true" >> "$GITHUB_OUTPUT"
              echo "deployment_id=$latest_id" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set up JDK 11 (Temurin)
        if: steps.check.outputs.new_deployment == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Run automation suite (headless)
        if: steps.check.outputs.new_deployment == 'true'
        run: >
          mvn clean test
          -Dheadless=true
          -Dcucumber.filter.tags="@positive or @negative"

      - name: Upload Extent Report, Cucumber reports and screenshots
        if: steps.check.outputs.new_deployment == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-reports
          path: |
            test-output/
            target/cucumber-reports/
            target/surefire-reports/
          retention-days: 14
          if-no-files-found: warn

      - name: Publish test summary
        if: steps.check.outputs.new_deployment == 'true' && always()
        uses: dorny/test-reporter@v1
        with:
          name: Cucumber/TestNG Results
          path: "target/surefire-reports/TEST-*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Record processed deployment ID
        # Only when we actually have a real deployment ID to record - manual
        # workflow_dispatch runs don't produce one and skip this on purpose.
        if: steps.check.outputs.new_deployment == 'true' && steps.check.outputs.deployment_id != '' && always()
        run: |
          mkdir -p .github
          echo "${{ steps.check.outputs.deployment_id }}" > .github/last-deployment.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last-deployment.txt
          if git diff --cached --quiet; then
            echo "last-deployment.txt already up to date, nothing to commit."
          else
            git commit -m "chore: record processed Vercel deployment ${{ steps.check.outputs.deployment_id }} [skip ci]"
            git push
          fi
