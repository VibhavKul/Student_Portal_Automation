name: Student Portal Automation

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "Cucumber tag expression to run"
        required: false
        default: "@positive or @negative"

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    env:
      APP_URL: http://localhost:5173/

    steps:
      - name: Checkout automation repo
        uses: actions/checkout@v4

      - name: Checkout Student Portal app repo
        uses: actions/checkout@v4
        with:
          repository: VibhavKul/Student_Portal
          path: student-portal-app

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: student-portal-app/package-lock.json

      - name: Install app dependencies
        working-directory: student-portal-app
        run: npm ci

      - name: Start Student Portal dev server in background
        working-directory: student-portal-app
        run: |
          nohup npm run dev -- --host localhost --port 5173 > ../dev-server.log 2>&1 &
          disown

      - name: Wait for the app to become reachable
        run: |
          for i in $(seq 1 30); do
            if curl -sSf "$APP_URL" > /dev/null; then
              echo "App is up at $APP_URL"
              exit 0
            fi
            echo "Waiting for app to start... ($i/30)"
            sleep 2
          done
          echo "App did not become reachable in time" >&2
          cat dev-server.log || true
          exit 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run automation suite
        run: mvn clean test -Dcucumber.filter.tags="${{ github.event.inputs.tags }}"

      - name: Upload test reports, screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-reports
          path: |
            test-output/
            target/cucumber-reports/
            target/surefire-reports/
          retention-days: 14
          if-no-files-found: warn
