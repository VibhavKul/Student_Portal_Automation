# ==================================================================
# Student Portal Automation - Environment Configuration
# Update app.url and project.folder before running real tests.
# ==================================================================

# Base URL of the application under test (placeholder - update me)
app.url=http://localhost:5173/

# Base folder for reports, screenshots and logs output (relative to project root, CI-friendly)
project.folder=./test-output

# Browser to run tests on
browser=chrome

# Run Chrome headless (no visible browser window)
headless=true

# Wait timeouts (in seconds)
implicit.wait=10
explicit.wait=20
