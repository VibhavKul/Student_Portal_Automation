# ==================================================================
# Student Portal Automation - Environment Configuration
# ==================================================================

# Base URL of the application under test - the live Vercel production deployment
app.url=https://student-portal-kappa-ivory.vercel.app

# Base folder for reports, screenshots and logs output (relative to project root, CI-friendly)
project.folder=./test-output

# Browser to run tests on
browser=chrome

# Environment label surfaced in the Extent report metadata
env=production

# Run Chrome headless (no visible browser window). Default false so local runs are
# watchable; CI overrides this via -Dheadless=true (see ConfigReader's system
# property / env var precedence).
headless=false

# Wait timeouts (in seconds)
implicit.wait=10
explicit.wait=20
